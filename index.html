<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Shaurya Harkar - terminal-inspired resume website for a web designer and full-stack developer."
    />
    <title>Shaurya Harkar | Resume Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260330-5" />
  </head>
  <body>
    <div class="boot-screen" id="boot-screen" aria-hidden="true">
      <div class="boot-panel">
        <p class="boot-title">resume-terminal.exe</p>
        <div class="boot-log" id="boot-log">
          <p>&gt; initializing interface...</p>
        </div>
      </div>
    </div>

    <div class="screen-glow" aria-hidden="true"></div>
    <div class="site-shell">
      <header class="terminal-window hero-shell">
        <div class="window-bar">
          <div class="window-dots" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <p class="window-title" id="terminal-label">resume-terminal</p>
          <p class="window-title">LIVE PORTFOLIO VIEW</p>
        </div>

        <div class="hero-grid">
          <section class="hero-copy" aria-labelledby="hero-name">
            <p class="shell-prompt">$ ./open --resume --terminal</p>
            <div class="identity-row">
              <div class="hero-heading">
                <p class="eyebrow">PROFESSIONAL PROFILE</p>
                <h1 id="hero-name">Loading profile...</h1>
              </div>

              <aside class="portrait-shell">
                <div class="portrait-frame">
                  <div class="portrait-badge">PROFILE.IMG</div>
                  <img src="./profile.jpg?v=20260330-5" alt="Portrait of Shaurya Harkar" class="portrait-image" />
                </div>
              </aside>
            </div>
            <p class="hero-title" id="hero-title"></p>
            <p class="hero-tagline" id="hero-tagline"></p>
            <p class="hero-bio" id="hero-bio"></p>

            <div class="hero-meta">
              <div class="meta-chip">
                <span class="meta-label">LOC</span>
                <span id="hero-location"></span>
              </div>
              <div class="meta-chip">
                <span class="meta-label">STATUS</span>
                <span id="hero-availability"></span>
              </div>
              <div class="meta-chip">
                <span class="meta-label">SYNC</span>
                <span id="hero-updated"></span>
              </div>
            </div>

            <div class="stats-grid" id="stats-grid"></div>

            <div class="action-row" id="hero-actions"></div>
          </section>
        </div>
      </header>

      <main class="terminal-window content-shell">
        <div class="window-bar">
          <div class="window-dots" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <p class="window-title">SCROLLABLE RESUME LOG</p>
          <p class="window-title">use nav to jump</p>
        </div>

        <div class="content-grid">
          <aside class="terminal-nav">
            <p class="shell-prompt">$ ls sections/</p>
            <div class="nav-list" id="nav-list"></div>
          </aside>

          <section class="terminal-scroll" id="terminal-scroll" aria-live="polite">
            <div class="section-stack" id="section-stack">
              <section class="section-card loading-card">
                <p class="section-command">cat resume.json</p>
                <p>Loading portfolio data...</p>
              </section>
            </div>
          </section>
        </div>
      </main>
    </div>

    <noscript>
      <div class="noscript-banner">This portfolio uses JavaScript to render the resume data.</div>
    </noscript>

    <script type="module" src="./main.js?v=20260330-5"></script>
  </body>
</html>
